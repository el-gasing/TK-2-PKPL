<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark light">
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Merriweather:wght@400;700&family=Nunito+Sans:wght@400;600;700;800&family=Poppins:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>{% block title %}Tim Bjorka{% endblock %}</title>
  <style>
    :root {
      --primary: {{ theme_tokens.primary|default:'#38bdf8' }};
      --secondary: {{ theme_tokens.secondary|default:'#1e293b' }};
      --bg: {{ theme_tokens.bg|default:'#0b1120' }};
      --paper: {{ theme_tokens.paper|default:'#111827' }};
      --paper-2: {{ theme_tokens.paper_2|default:'#1f2937' }};
      --ink: {{ theme_tokens.ink|default:'#e2e8f0' }};
      --ink-soft: {{ theme_tokens.ink_soft|default:'#cbd5e1' }};
      --muted: {{ theme_tokens.muted|default:'#94a3b8' }};
      --line: {{ theme_tokens.line|default:'#334155' }};
      --hero-a: {{ theme_tokens.hero_a|default:'#172554' }};
      --hero-b: {{ theme_tokens.hero_b|default:'#1e293b' }};
      --radius: 18px;
      --font: {{ theme_font_stack|default:'Manrope, sans-serif' }};
      --font-display: var(--font);
      --accent-a: color-mix(in srgb, var(--primary) 74%, #ffffff);
      --accent-b: color-mix(in srgb, var(--primary) 38%, var(--secondary) 62%);
      --focus-ring: color-mix(in srgb, var(--primary) 42%, var(--line));
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--font);
      color: var(--ink);
      background:
        radial-gradient(960px 420px at 10% -18%, var(--hero-a) 0%, transparent 62%),
        radial-gradient(960px 420px at 90% -20%, var(--hero-b) 0%, transparent 64%),
        var(--bg);
      min-height: 100vh;
    }

    h1, h2, h3, h4 {
      font-family: var(--font-display);
    }

    .page {
      width: min(940px, calc(100% - 24px));
      margin: 22px auto 34px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .brand {
      margin: 0;
      font-size: .9rem;
      letter-spacing: .45px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 800;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .email {
      border: 1px solid var(--line);
      background: var(--paper-2);
      border-radius: 999px;
      padding: 8px 11px;
      color: var(--ink-soft);
      font-size: .8rem;
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      border: 1px solid transparent;
      text-decoration: none;
      font-size: .86rem;
      font-weight: 700;
      padding: 10px 14px;
      cursor: pointer;
      transition: .16s ease;
    }

    .btn-main {
      color: color-mix(in srgb, var(--ink) 90%, #0b1020);
      background: linear-gradient(100deg, var(--accent-a), var(--accent-b));
      box-shadow: 0 10px 22px rgba(0, 0, 0, .28);
    }

    .btn-main:hover { transform: translateY(-1px); }

    .btn-soft {
      color: var(--ink-soft);
      border-color: var(--line);
      background: var(--paper-2);
    }

    .btn-soft:hover {
      border-color: var(--focus-ring);
      color: var(--ink);
    }

    .shell {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      padding: 18px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, .24);
    }

    .messages {
      list-style: none;
      margin: 0 0 12px;
      padding: 0;
    }

    .messages li {
      border: 1px solid color-mix(in srgb, var(--primary) 55%, var(--line));
      background: color-mix(in srgb, var(--primary) 24%, var(--paper));
      color: var(--ink);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: .9rem;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--paper-2);
      color: var(--ink);
      padding: 10px 12px;
      margin: 6px 0 12px;
      font-size: .92rem;
      font-family: var(--font);
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--focus-ring);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 24%, transparent);
    }

    label {
      display: block;
      font-size: .84rem;
      font-weight: 700;
      color: var(--muted);
    }

    @media (max-width: 760px) {
      .page { width: calc(100% - 14px); margin-top: 12px; }
      .top { flex-direction: column; align-items: flex-start; }
      .shell { padding: 14px; }
      .email { max-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="top">
      <p class="brand">PKPL • TK 2</p>
      <div class="actions">
        {% if user.is_authenticated %}
          <span class="email">{{ user.email }}</span>
          {% if can_edit_site %}
            <a class="btn btn-main" href="{% url 'edit_theme' %}">Edit Tampilan</a>
          {% endif %}
          <form method="post" action="{% url 'account_logout' %}">
            {% csrf_token %}
            <button class="btn btn-soft" type="submit">Logout</button>
          </form>
        {% else %}
          <a class="btn btn-main" href="{% url 'quick_login' %}">Login Google</a>
        {% endif %}
      </div>
    </header>

    {% if messages %}
      <ul class="messages">
        {% for message in messages %}
          <li>{{ message }}</li>
        {% endfor %}
      </ul>
    {% endif %}

    <main class="shell">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
